{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold">Import Data ODC</h2>
    <p class="text-sm opacity-60">Unggah file Excel (.xlsx) untuk menambah banyak data sekaligus.</p>
</div>

<div class="card bg-base-100 shadow-md max-w-xl">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-control w-full mb-6">
                <label class="label">
                    <span class="label-text font-bold">Pilih File Excel</span>
                </label>
                <input type="file" name="excel_file" class="file-input file-input-bordered w-full" accept=".xlsx"
                    required />
                <label class="label">
                    <span class="label-text-alt">Format kolom: name, address, coordinates, capacity</span>
                </label>
            </div>

            <div class="card-actions justify-end">
                <a href="{{ url_for('odc.index') }}" class="btn btn-ghost">Batal</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-upload mr-1"></i> Mulai Import</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
