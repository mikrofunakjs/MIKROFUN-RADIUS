<!DOCTYPE html>
<html lang="en" data-theme="lofi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Teknisi - MikroFun</title>
    <!-- Tailwind CSS + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow-x: hidden;
        }
    </style>
</head>

<body>
    <div class="mobile-container flex flex-col justify-center px-6">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-primary/10 text-primary mb-4 shadow-sm">
                <i class="bi bi-wrench-adjustable-circle text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Portal Teknisi</h1>
            <p class="text-sm text-gray-500 mt-1">Sistem Manajemen Lapangan ISP</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flex flex-col gap-2 mb-6">
            {% for category, message in messages %}
            <div role="alert"
                class="alert alert-{{ category if category != 'danger' else 'error' }} shadow-sm py-2 px-3 text-sm rounded-lg flex items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('tech.login') }}" class="space-y-4">
            <div class="form-control">
                <label class="label"><span
                        class="label-text font-bold text-xs uppercase tracking-wider text-gray-500">ID Teknisi /
                        Username</span></label>
                <div class="relative">
                    <i class="bi bi-person absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" name="username" class="input input-bordered w-full pl-11 bg-gray-50"
                        placeholder="Masukkan ID pekerja..." required>
                </div>
            </div>

            <div class="form-control">
                <label class="label"><span
                        class="label-text font-bold text-xs uppercase tracking-wider text-gray-500">PIN /
                        Password</span></label>
                <div class="relative">
                    <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" name="password" class="input input-bordered w-full pl-11 bg-gray-50"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full shadow-lg shadow-primary/30 mt-4 h-12 text-base">
                Mulai Bertugas <i class="bi bi-arrow-right ml-1"></i>
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-10 font-medium">
            &copy; MikroFun System <br> Modul Teknisi Lapangan
        </p>

    </div>
</body>

</html>
