{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center max-w-lg">
        <div class="text-8xl font-black text-error opacity-20 mb-4">500</div>
        <h2 class="text-2xl font-bold mb-2">Internal Server Error</h2>
        <p class="text-sm opacity-60 mb-6">Terjadi kesalahan pada server. Error ini sudah dicatat secara otomatis di
            menu Logs.</p>
        {% if error %}
        <div class="alert alert-error alert-sm text-left text-xs mb-6">
            <i class="bi bi-bug"></i>
            <code>{{ error }}</code>
        </div>
        {% endif %}
        <div class="flex gap-3 justify-center">
            <a href="{{ url_for('logs.index', level='ERROR') }}" class="btn btn-error btn-sm gap-2">
                <i class="bi bi-journal-code"></i> Lihat Error Log
            </a>
            <a href="/" class="btn btn-ghost btn-sm">Kembali ke Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
