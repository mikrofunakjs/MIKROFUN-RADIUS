<!DOCTYPE html>
<html>

<head>
    <title>Print Vouchers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            background: #f0f0f0;
        }

        .print-area {
            width: 58mm;
            background: white;
            margin: 0 auto;
            padding: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }

        .voucher {
            border-bottom: 2px dashed #000;
            padding: 15px 5px;
            text-align: center;
            page-break-inside: avoid;
        }

        .voucher:last-child {
            border-bottom: none;
        }

        .isp-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .profile-name {
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .code {
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #000;
            display: inline-block;
            padding: 5px 15px;
            margin: 10px 0;
        }

        .info {
            font-size: 11px;
            margin-top: 5px;
        }

        .footer {
            font-size: 10px;
            margin-top: 10px;
            opacity: 0.8;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .print-area {
                box-shadow: none;
                width: 100%;
            }

            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="no-print" style="text-align: center; margin-bottom: 20px;">
        <button onclick="window.print()"
            style="padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer;">
            PRINT NOW
        </button>
        <button onclick="history.back()"
            style="padding: 10px 20px; background: #6b7280; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">
            KEMBALI
        </button>
    </div>

    <div class="print-area">
        {% for v in vouchers %}
        <div class="voucher">
            <div class="isp-name">{{ isp_name }}</div>
            <div class="profile-name">{{ v.profile_name }}</div>
            <div class="info">KODE VOUCHER:</div>
            <div class="code">{{ v.code }}</div>
            <div class="info">
                Speed: {{ v.rate_limit or 'Best Effort' }}<br>
                Masa Aktif: {{ v.validity }}<br>
                Harga: Rp {{ "{:,.0f}".format(v.price|float) }}
            </div>
            <div class="footer">Terima kasih atas kepercayaan Anda.</div>
        </div>
        {% endfor %}
    </div>
</body>

</html>
