{% extends "base.html" %}
{% block title %}Buat Tiket Baru{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center gap-4">
        <a href="{{ url_for('helpdesk.index') }}" class="btn btn-sm btn-ghost btn-circle">
            <i class="bi bi-arrow-left text-xl"></i>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Buat Tiket Baru</h1>
            <p class="text-sm text-gray-500">Daftarkan keluhan atau permintaan pelanggan ke sistem</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" action="">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Pelanggan <span class="text-error">*</span></span></label>
                    <select name="customer_id" class="select select-bordered bg-gray-50 focus:bg-white" required>
                        <option value="" disabled selected>-- Pilih Pelanggan --</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.name }} ({{ c.username }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Kategori</span></label>
                    <select name="category" class="select select-bordered bg-gray-50 focus:bg-white">
                        <option value="General">General</option>
                        <option value="Gangguan Internet">Gangguan Internet</option>
                        <option value="Tagihan & Pembayaran">Tagihan & Pembayaran</option>
                        <option value="Instalasi Baru">Instalasi Baru</option>
                        <option value="Pindah Alamat">Pindah Alamat</option>
                        <option value="Upgrade Speed">Upgrade Speed</option>
                        <option value="Keluhan Teknis">Keluhan Teknis</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div class="form-control md:col-span-2">
                    <label class="label"><span class="label-text font-bold">Subject <span class="text-error">*</span></span></label>
                    <input type="text" name="subject" class="input input-bordered bg-gray-50 focus:bg-white w-full"
                        placeholder="Contoh: Internet sering putus nyambung" maxlength="200" required>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Prioritas</span></label>
                    <select name="priority" class="select select-bordered bg-gray-50 focus:bg-white">
                        <option value="low">Rendah</option>
                        <option value="medium" selected>Sedang</option>
                        <option value="high">Tinggi</option>
                    </select>
                </div>

                <div class="form-control md:col-span-2">
                    <label class="label"><span class="label-text font-bold">Deskripsi / Pesan Awal <span class="text-error">*</span></span></label>
                    <textarea name="message" class="textarea textarea-bordered bg-gray-50 focus:bg-white h-32"
                        placeholder="Jelaskan detail masalah atau permintaan pelanggan..." maxlength="5000" required></textarea>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3 pt-6 border-t border-gray-100">
                <a href="{{ url_for('helpdesk.index') }}" class="btn btn-ghost">Batal</a>
                <button type="submit" class="btn btn-primary px-8">Buat Tiket</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
