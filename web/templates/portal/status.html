<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Berhasil - {{ app_name if app_name != 'MikroFun' else hotspot_name }}</title>
    {% if app_logo %}
    <link rel="icon" type="image/x-icon" href="{{ app_logo }}">
    {% endif %}
    <!-- Offline Success Page with Inline CSS -->
    <style>
        :root {
            --success: #22c55e;
            --primary: #0ea5e9;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Success Icon Animation */
        .icon-circle {
            width: 80px; height: 80px;
            background: rgba(34, 197, 94, 0.15);
            border: 1.5px solid rgba(34, 197, 94, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }
        .icon-circle svg { width: 44px; height: 44px; fill: var(--success); }

        h2 { font-size: 26px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.5px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            border: none;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-ghost { background: transparent; color: #64748b; box-shadow: none; margin-top: 12px; font-weight: 500; font-size: 12px; }

        .footer { margin-top: 40px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer span { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 4px; }
        .footer h4 { margin: 0; font-size: 14px; color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M20.285 2l-11.285 11.567-5.286-5.011-3.714 3.716 9 8.728 15-15.285z"/></svg>
        </div>

        <h2>Koneksi Berhasil!</h2>
        <p>Voucher Anda telah divalidasi. Sekarang Anda sudah terhubung ke internet. Selamat berselancar!</p>

        <div style="display: flex; flex-direction: column;">
            <a href="https://google.com" class="btn">
                Mulai Browsing
            </a>
            <button onclick="window.close()" class="btn btn-ghost">Tutup Halaman Ini</button>
        </div>

        <div class="footer">
            <span>Powering Internet for</span>
            <h4>{{ hotspot_name }}</h4>
        </div>
    </div>

</body>
</html>
