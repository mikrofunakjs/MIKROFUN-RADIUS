{% extends "client/base_app.html" %}

{% set hide_nav = True %}

{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-white">
    <div class="w-full max-w-sm">
        <!-- Logo / Header -->
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 overflow-hidden shadow-sm border border-gray-100">
                {% if app_logo %}
                <img src="{{ app_logo }}" alt="Logo" class="w-full h-full object-contain p-2">
                {% else %}
                <i class="bi bi-wifi text-4xl text-primary"></i>
                {% endif %}
            </div>
            <h1 class="text-2xl font-bold text-gray-900">{{ app_name }}</h1>
            <p class="text-gray-500 text-sm mt-2">Masuk untuk cek tagihan & status internet.</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('client.login') }}" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Username / ID Pelanggan</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username"
                        class="input input-bordered w-full pl-10 bg-gray-50 focus:bg-white transition"
                        placeholder="Masukkan ID Anda" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password"
                        class="input input-bordered w-full pl-10 bg-gray-50 focus:bg-white transition"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full shadow-lg shadow-primary/30 rounded-xl">
                Masuk Sekarang <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-xs text-gray-400">
                Lupa password? Hubungi <a href="#" class="text-primary font-bold">Admin</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
