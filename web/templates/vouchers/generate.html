{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2><i class="bi bi-ticket"></i> Generate Voucher</h2>
</div>
<div class="card" style="max-width:500px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Profile</label>
                <select name="profile_id" class="form-select" required>
                    <option value="">-- Pilih Profile --</option>
                    {% for p in profiles %}
                    <option value="{{ p.id }}">{{ p.name }} ({{ p.rate_limit or 'no limit' }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Durasi (Jam)</label>
                    <input type="number" name="duration_hours" class="form-control" value="24">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Jumlah</label>
                    <input type="number" name="quantity" class="form-control" value="10" min="1" max="100">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Harga (Rp)</label>
                    <input type="number" name="price" class="form-control" value="5000">
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-lightning"></i> Generate</button>
            <a href="{{ url_for('vouchers.index') }}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
